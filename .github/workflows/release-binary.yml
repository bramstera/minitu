# Build static, stripped minitunnel binaries for linux/amd64 and linux/arm64.
# Triggered on version tags (v*) and manually via dispatch.
# Produces a tar.gz per arch and a combined release.
name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goarm: ''
          - goarch: arm64
            goarm: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.2'
          cache: true

      - name: Build static binary
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -eux
          mkdir -p out
          # -trimpath: remove local paths from binary
          # -s -w: strip debug symbols and DWARF (smallest w/o UPX)
          # netgo: force pure-Go DNS resolver (static, no libc)
          go build -trimpath -tags netgo -ldflags="-s -w -buildid=" \
            -o out/minitunnel-linux-${{ matrix.goarch }} ./cmd/minitunnel
          file out/minitunnel-linux-${{ matrix.goarch }}
          ls -lh out/minitunnel-linux-${{ matrix.goarch }}

      - name: Smoke test (amd64 host only)
        if: matrix.goarch == 'amd64'
        run: |
          set -eux
          # --help equivalent: start in direct mode briefly, confirm it boots
          timeout 3s ./out/minitunnel-linux-${{ matrix.goarch }} || code=$?
          # exit codes: 124 = timeout (ran fine, killed), 0 = exited cleanly
          [ "${code:-0}" = "124" ] || [ "${code:-0}" = "0" ]

      - name: Package tar.gz
        run: |
          cd out
          tar -czf minitunnel-linux-${{ matrix.goarch }}.tar.gz minitunnel-linux-${{ matrix.goarch }}
          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minitunnel-linux-${{ matrix.goarch }}
          path: out/minitunnel-linux-${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: minitunnel ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*.tar.gz
